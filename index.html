<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Beans &#8212; Kalkulator zam&#xF3;wie&#x144;</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>
/* ============================================================
   EDYTUJ TUTAJ - Cennik i znizki
   ============================================================

   MENU - pozycje dostepne dla wszystkich
   { id, name, price, emoji }

   COMPANIES - firmy ze znizka
   {
     id, name, suffix,
     discounts: { id_pozycji: cena }
     - brak wpisu = normalna cena, brak dopisku
     - liczba     = znizka + dopisek suffix na fakturze
     - null       = zablokowana pozycja
   }

   SPECIAL - specjalne oferty (osobna zakladka)
   {
     id:       unikalny klucz
     name:     nazwa zakladki
     color:    kolor motywu: 'blue' | 'green' | 'purple' | 'orange'
     note:     opis widoczny pod nazwa (mozna "" jezeli brak)
     items: lista pozycji do wyboru (te same id co w MENU lub nowe)
       { id, name, emoji }
     pricePerSet:  cena za 1 zestaw (liczba)
     minQty:       minimalna ilosc zestawow (domyslnie 1, wpisz 1 jezeli brak minimum)
     maxQty:       maksymalna ilosc zestawow (0 = brak limitu)
     promoQty:     od ilu zestawow wchodzi cena promocyjna (0 = brak promocji)
     promoPrice:   cena promocyjna za zestaw (gdy promoQty > 0)
   }
   ============================================================ */

const MENU = [
  { id: 'standard',  name: 'Standard',   price: 800,  emoji: '\u2B50' },
  { id: 'slodziak',  name: 'S\u0142odziak',   price: 1500, emoji: '\uD83C\uDF6C' },
  { id: 'pracus',    name: 'Pracu\u015B',     price: 1300, emoji: '\uD83D\uDCBC' },
  { id: 'gagatek',   name: 'Gagatek',    price: 1300, emoji: '\uD83D\uDE0E' },
  { id: 'ciastko',   name: 'Ciastko',    price: 900,  emoji: '\uD83C\uDF6A' },
  { id: 'koktajl',   name: 'Koktajl',    price: 900,  emoji: '\uD83E\uDD64' },
  { id: 'tost',      name: 'Tost',       price: 450,  emoji: '\uD83C\uDF5E' },
  { id: 'smoothie',  name: 'Smoothie',   price: 450,  emoji: '\uD83E\uDD64' },
];

const COMPANIES = [
  /*{
    id:      'lsc',
    name:    'LSC',
    suffix:  'LSC',
    discounts: {
      standard: 400,
      pracus:   650,
      gagatek:  650,
    }
  },*/
  /* --- PRZYKLAD nowej firmy - odkomentuj i wypelnij ---
  {
    id:     'xyz',
    name:   'XYZ Corp',
    suffix: 'XYZ',
    discounts: {
      ciastko:  700,
      smoothie: 350,
    }
  },
  ----------------------------------------------------- */
];

const SPECIAL = [
  {
    id:          'doj',
    name:        'DOJ',
    color:       'blue',
    note:        'Ka\u017Cda osoba pracuj\u0105ca na departamencie ( po okazaniu odznaki ) posiada zni\u017Ck\u0119 na zestawy standard za 1$ raz na 3h. (Pamiętaj aby zapisać komu wydaliście zestaw i sprawdzić czy już mineło 3h)',
    items: [
      { id: 'standard', name: 'Standard', emoji: '\uD83D\uDC6E' },
    ],
    pricePerSet:  0.333334,
    minQty:       3,
    maxQty:       3,
    promoQty:     0,
    promoPrice:   0,
  },

  /* --- PRZYKLAD nowej specjalnej oferty - odkomentuj i wypelnij ---
  {
    id:          'vip',
    name:        'VIP',
    color:       'purple',
    note:        'Oferta VIP - im wiecej tym taniej!',
    items: [
      { id: 'ciastko',  name: 'Ciastko',  emoji: '\uD83C\uDF6A' },
      { id: 'koktajl',  name: 'Koktajl',  emoji: '\uD83E\uDD64' },
      { id: 'smoothie', name: 'Smoothie', emoji: '\uD83E\uDD64' },
    ],
    pricePerSet:  300,
    minQty:       1,
    maxQty:       0,
    promoQty:     5,
    promoPrice:   200,
  },
  ------------------------------------------------------------------ */
];

const SETTINGS = {
  currency:         '$',
  copyAllSeparator: ' - ',
  useDiscountWord:  false,
  discountWord:     'znizka',
};
</script>
<style>
  :root {
    --pink:        #e8a0c8;
    --pink-dark:   #c06090;
    --brown:       #c8a080;
    --border:      rgba(220,160,100,0.18);
    --text:        #f0e0c8;
    --muted:       #b09080;
    --shadow:      rgba(0,0,0,0.4);
    --accent:      #f08ab8;
    --bg1:         #120a05;
    --glass:       rgba(30,15,8,0.65);
    --glass-b:     rgba(255,200,150,0.12);
    --success:     #6ab87a;
  }
  .light {
    --pink:        #e8a0c8;
    --pink-dark:   #c06090;
    --brown:       #6b4423;
    --border:      rgba(180,120,80,0.2);
    --text:        #3a2010;
    --muted:       #9a7060;
    --shadow:      rgba(180,100,60,0.1);
    --accent:      #d4608a;
    --bg1:         #fdf6ee;
    --glass:       rgba(255,255,255,0.55);
    --glass-b:     rgba(255,255,255,0.7);
    --success:     #5a9e6a;
  }

  /* Color themes for special tabs */
  .sc-blue   { --sc1: rgba(60,100,200,0.18);  --sc2: rgba(80,130,240,0.32);  --sc3: #7aaaff; --scg1: #4a6fd4; --scg2: #2a4ab0; }
  .sc-green  { --sc1: rgba(60,160,100,0.18);  --sc2: rgba(80,180,120,0.32);  --sc3: #6ad88a; --scg1: #3aaa60; --scg2: #1a8040; }
  .sc-purple { --sc1: rgba(120,60,200,0.18);  --sc2: rgba(150,80,230,0.32);  --sc3: #c088ff; --scg1: #8a50e0; --scg2: #5a30b0; }
  .sc-orange { --sc1: rgba(200,120,40,0.18);  --sc2: rgba(230,150,60,0.32);  --sc3: #ffb860; --scg1: #e08030; --scg2: #b05010; }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(232,160,200,.15) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(212,165,100,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:1.5rem 1rem 3rem}

  /* Header */
  .header{text-align:center;margin-bottom:1.25rem;position:relative}
  .theme-btn{position:absolute;right:0;top:0;background:var(--glass);border:1px solid var(--glass-b);border-radius:2rem;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;backdrop-filter:blur(10px);transition:all .2s}
  .theme-btn:hover{color:var(--accent);border-color:var(--accent)}
  .logo-cool{font-family:'Pacifico',cursive;font-size:3rem;color:var(--pink);line-height:1;display:block;text-shadow:3px 3px 0 var(--brown),1px 1px 0 rgba(0,0,0,.3)}
  .logo-beans{display:inline-block;background:var(--glass);border:1px solid var(--glass-b);backdrop-filter:blur(8px);border-radius:2rem;padding:3px 20px;font-size:.7rem;letter-spacing:.45em;text-transform:uppercase;color:var(--brown);font-weight:800;margin-top:3px}
  .tagline{font-size:11px;color:var(--muted);letter-spacing:.08em;margin-top:.4rem}
  .sep{height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:1rem 0;opacity:.4}
  .sec-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;font-weight:800;padding-left:2px}

  /* Tab bar */
  .tab-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
  .tab-chip{padding:6px 16px;border-radius:2rem;border:1.5px solid var(--border);background:var(--glass);backdrop-filter:blur(8px);font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .18s;font-family:'Nunito',sans-serif}
  .tab-chip:hover{border-color:var(--pink);color:var(--pink)}
  .tab-chip.act-normal{background:rgba(232,160,200,.15);border-color:var(--pink);color:var(--pink)}
  .tab-chip.act-company{background:rgba(100,180,120,.12);border-color:rgba(80,160,100,.35);color:#6ab87a}
  .tab-chip.act-special{background:var(--sc1,rgba(60,100,200,.15));border-color:var(--sc2,rgba(80,130,240,.3));color:var(--sc3,#7aaaff)}

  /* Menu grid */
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
  .item-card{background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;padding:10px 10px 10px 12px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);box-shadow:0 2px 14px var(--shadow);transition:transform .15s,box-shadow .15s,opacity .2s;gap:6px}

  .price-disc{color:#6ab87a;font-weight:800}
  .qty-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}

  .qty-num{min-width:18px;text-align:center;font-size:14px;font-weight:800;color:var(--text)}

  /* Special panel */
  .sp-panel{border-radius:20px;padding:1.1rem 1.2rem;backdrop-filter:blur(14px);box-shadow:0 4px 24px var(--shadow);margin-bottom:1rem;background:var(--sc1,rgba(60,100,200,.12));border:1.5px solid var(--sc2,rgba(80,130,240,.3))}

  .sp-note{font-size:12px;color:var(--sc3,#7aaaff);background:rgba(0,0,0,.15);border:1px solid var(--sc2,rgba(80,130,240,.3));border-radius:10px;padding:10px 12px;line-height:1.6;margin-bottom:1rem;font-style:italic}

  /* Item selector in special */
  .sp-items-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--sc3,#7aaaff);opacity:.7;margin-bottom:.5rem;font-weight:800}
  .sp-items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-bottom:1rem}
  .sp-item-chip{padding:8px 10px;border-radius:12px;border:1.5px solid var(--sc2,rgba(80,130,240,.3));background:rgba(0,0,0,.15);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;text-align:center;font-family:'Nunito',sans-serif}
  .sp-item-chip:hover{border-color:var(--sc3,#7aaaff);color:var(--sc3,#7aaaff)}
  .sp-item-chip.selected{background:var(--sc1,rgba(60,100,200,.2));border-color:var(--sc3,#7aaaff);color:var(--sc3,#7aaaff)}

  /* Qty row in special */
  .sp-qty-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.15);border:1px solid var(--sc2,rgba(80,130,240,.3));border-radius:14px;padding:12px 16px;margin-bottom:.75rem}
  .sp-qty-info{font-size:12px;color:var(--sc3,#7aaaff);opacity:.8}
  .sp-qty-info strong{font-size:15px;color:var(--sc3,#7aaaff);opacity:1;display:block}
  .sp-qty-ctrl{display:flex;align-items:center;gap:8px}
  .sp-qty-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--scg1,#4a6fd4);background:transparent;color:var(--sc3,#7aaaff);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Nunito',sans-serif;font-weight:800}

  .sp-qty-num{font-size:22px;font-weight:800;color:var(--text);min-width:32px;text-align:center}

  /* Price display in special */
  .sp-price-box{background:rgba(0,0,0,.2);border:1px solid var(--sc2,rgba(80,130,240,.3));border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .sp-price-label{font-size:11px;color:var(--sc3,#7aaaff);opacity:.7;font-weight:700}
  .sp-price-val{font-size:20px;font-weight:800;color:var(--sc3,#7aaaff)}
  .sp-promo-badge{font-size:10px;background:linear-gradient(135deg,var(--scg1,#4a6fd4),var(--scg2,#2a4ab0));color:white;border-radius:2rem;padding:2px 10px;font-weight:800;margin-left:8px}

  /* Summary */
  .summary-box{background:var(--glass);border:1px solid var(--glass-b);border-radius:20px;padding:1.1rem 1.2rem;backdrop-filter:blur(16px);box-shadow:0 4px 24px var(--shadow);margin-bottom:.75rem}
  .summary-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:.6rem}
  .copy-row{display:flex;gap:8px;margin-bottom:8px}
  .copy-fw{flex:1;min-width:0}
  .copy-ft{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .copy-block{background:rgba(0,0,0,.12);border:1px dashed var(--border);border-radius:10px;padding:9px 11px;font-family:'Courier New',monospace;font-size:12.5px;color:var(--text);line-height:1.5;min-height:38px;word-break:break-word;margin-bottom:8px}
  .mini-btn{width:100%;padding:9px 8px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;text-align:center;box-shadow:0 3px 10px rgba(208,96,138,.25)}
  .mini-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(208,96,138,.35)}
  .mini-btn:active{transform:scale(.97)}
  .mini-btn:disabled{opacity:.3;cursor:default;box-shadow:none}
  .mini-btn.done{background:linear-gradient(135deg,var(--success),#3d7a4f) !important;box-shadow:none !important}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding-top:.7rem;border-top:1px solid var(--border);margin-top:.2rem}
  .total-label{font-size:13px;color:var(--muted);font-weight:700}
  .total-value{font-size:24px;font-weight:800;color:var(--accent)}
  .btn-all{width:100%;padding:12px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(208,96,138,.3);margin-bottom:8px}

  .bean-deco{text-align:center;margin-top:2rem;font-size:18px;opacity:.2;letter-spacing:6px}

<body>
<div class="wrap">

  <div class="header">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#x2600;&#xFE0F; Jasny</button>
    <span class="logo-cool">Cool</span>

  <div class="sep"></div>

  <div class="sec-label">&#x1F3E2; Tryb zam&#xF3;wienia</div>
  <div class="tab-bar" id="tabBar"></div>

  <div class="sep"></div>

  <div class="sec-label" id="menuLabel">&#9749; Menu</div>
  <div id="menuArea"></div>

  <div class="sep"></div>

  <div class="summary-box">
    <div class="summary-label">&#x1F4CB; Podsumowanie</div>

        <div class="copy-ft">&#x1F6D2; Zam&#xF3;wienie</div>

      </div>
      <div class="copy-fw">
        <div class="copy-ft">&#x1F4B0; Kwota</div>
        <div class="copy-block" id="priceText"><span style="color:var(--muted);font-style:italic;font-size:12px;">0$</span></div>

<script>
/* ── State ── */
const qty = {};
MENU.forEach(i => { qty[i.id] = 0; });

// Special state per offer
const spState = {};
SPECIAL.forEach(sp => {
  spState[sp.id] = {
    selectedItem: sp.items[0] ? sp.items[0].id : null,
    qty: sp.minQty > 0 ? sp.minQty : 1,
  };
});

let mode = { type: 'normal', data: null };
let light = false;

/* ── Normal/company helpers ── */
function getPrice(item) {
  if (mode.type !== 'company') return item.price;
  const d = mode.data.discounts;
  if (!Object.prototype.hasOwnProperty.call(d, item.id)) return item.price;
  if (d[item.id] === null) return null;
  return d[item.id];
}
function hasDiscount(item) {
  if (mode.type !== 'company') return false;
  const d = mode.data.discounts;
  return Object.prototype.hasOwnProperty.call(d, item.id) && d[item.id] !== null;
}
function getLabel(item) {
  if (!hasDiscount(item)) return item.name;
  const suf = mode.data.suffix;
  return SETTINGS.useDiscountWord ? item.name + ' ' + SETTINGS.discountWord + ' ' + suf : item.name + ' ' + suf;
}

/* ── Special price helper ── */
function getSpPrice(sp, q) {
  if (sp.promoQty > 0 && q >= sp.promoQty) return sp.promoPrice;
  return sp.pricePerSet;
}

/* ── Tab bar ── */
function buildTabBar() {
  const bar = document.getElementById('tabBar');
  let html = '<button class="tab-chip act-normal" id="tab_normal" onclick="setMode(\'normal\',null)">Normalny</button>';
  COMPANIES.forEach(c => {
    html += '<button class="tab-chip" id="tab_' + c.id + '" onclick="setMode(\'company\',\'' + c.id + '\')">' + c.name + '</button>';
  });
  SPECIAL.forEach(sp => {
    html += '<button class="tab-chip sc-' + (sp.color||'blue') + '" id="tab_' + sp.id + '" onclick="setMode(\'special\',\'' + sp.id + '\')">' + sp.name + '</button>';
  });
  bar.innerHTML = html;
}

function setMode(type, id) {
  if (type === 'normal')   mode = { type: 'normal',   data: null };
  else if (type === 'company') mode = { type: 'company', data: COMPANIES.find(c => c.id === id) };
  else                     mode = { type: 'special',  data: SPECIAL.find(sp => sp.id === id) };

  document.querySelectorAll('.tab-chip').forEach(el => el.classList.remove('act-normal','act-company','act-special'));
  const chip = document.getElementById('tab_' + (type === 'normal' ? 'normal' : id));
  if (chip) chip.classList.add(type === 'normal' ? 'act-normal' : type === 'company' ? 'act-company' : 'act-special');

  const label = type === 'normal' ? '\u2615 Menu'
    : type === 'company' ? '\u2615 Menu \u2014 ' + mode.data.name
    : '\uD83C\uDF1F Oferta specjalna \u2014 ' + mode.data.name;
  document.getElementById('menuLabel').textContent = label;

  if (type === 'company') MENU.forEach(item => { if (getPrice(item) === null) qty[item.id] = 0; });

  renderArea();
  update();
}

/* ── Render ── */
function renderArea() {
  const area = document.getElementById('menuArea');

  if (mode.type === 'special') {
    const sp = mode.data;
    const st = spState[sp.id];
    const colorClass = 'sc-' + (sp.color || 'blue');
    const unitPrice = getSpPrice(sp, st.qty);
    const total = unitPrice * st.qty;
    const isPromo = sp.promoQty > 0 && st.qty >= sp.promoQty;

    // Item selector (only if more than 1 item)
    let itemsHtml = '';
    if (sp.items.length > 1) {
      itemsHtml = '<div class="sp-items-label">Wybierz pozycj\u0119</div>'
        + '<div class="sp-items-grid">'
        + sp.items.map(it =>
          '<button class="sp-item-chip' + (st.selectedItem === it.id ? ' selected' : '') + '" onclick="selectSpItem(\'' + sp.id + '\',\'' + it.id + '\')">'
          + it.emoji + ' ' + it.name + '</button>'
        ).join('')
        + '</div>';
    }

    // Qty limits info
    const minInfo = sp.minQty > 1 ? 'Min: ' + sp.minQty : '';
    const maxInfo = sp.maxQty > 0 ? 'Max: ' + sp.maxQty : '';
    const promoInfo = sp.promoQty > 0 ? 'Promo od ' + sp.promoQty + ' szt.' : '';
    const infoStr = [minInfo, maxInfo, promoInfo].filter(Boolean).join(' \u00B7 ');

    const canMinus = st.qty > Math.max(1, sp.minQty);
    const canPlus  = sp.maxQty === 0 || st.qty < sp.maxQty;

    let priceLine = '';
    if (isPromo) {
      priceLine = '<span style="text-decoration:line-through;opacity:.5;font-size:14px;margin-right:6px">'
        + sp.pricePerSet.toLocaleString('pl-PL') + SETTINGS.currency + '</span>'
        + '<span class="sp-price-val">' + sp.promoPrice.toLocaleString('pl-PL') + SETTINGS.currency + '</span>'
        + '<span class="sp-promo-badge">PROMO</span>';
    } else {
      priceLine = '<span class="sp-price-val">' + unitPrice.toLocaleString('pl-PL') + SETTINGS.currency + '</span>'
        + (sp.promoQty > 0 ? '<span style="font-size:10px;color:var(--sc3);opacity:.6;margin-left:8px">promo od ' + sp.promoQty + 'x</span>' : '');
    }

    area.innerHTML = '<div class="sp-panel ' + colorClass + '">'
      + '<div class="sp-badge">&#x1F31F; ' + sp.name + '</div>'
      + (sp.note ? '<div class="sp-note">' + sp.note + '</div>' : '')
      + itemsHtml
      + '<div class="sp-qty-row">'
      + '<div class="sp-qty-info"><strong>Ilo\u015B\u0107 zestaw\u00F3w</strong>' + (infoStr ? infoStr : '') + '</div>'
      + '<div class="sp-qty-ctrl">'
      + '<button class="sp-qty-btn" onclick="changeSpQty(\'' + sp.id + '\',-1)"' + (canMinus ? '' : ' disabled') + '>&#x2212;</button>'
      + '<span class="sp-qty-num" id="sp_qty_' + sp.id + '">' + st.qty + '</span>'
      + '<button class="sp-qty-btn" onclick="changeSpQty(\'' + sp.id + '\',1)"' + (canPlus ? '' : ' disabled') + '>+</button>'
      + '</div></div>'
      + '<div class="sp-price-box">'
      + '<div><div class="sp-price-label">Cena za zestaw</div>' + priceLine + '</div>'
      + '<div style="text-align:right"><div class="sp-price-label">Razem</div><div class="sp-price-val">' + total.toLocaleString('pl-PL') + SETTINGS.currency + '</div></div>'
      + '</div></div>';
    return;
  }

  area.innerHTML = '<div class="menu-grid">'
    + MENU.map(item => {
      const price = getPrice(item);
      const unavail = price === null;
      const disc = hasDiscount(item);
      let priceHtml = unavail
        ? '<span style="font-style:italic;opacity:.5">niedost\u0119pne</span>'
        : disc
          ? '<span class="price-orig">' + item.price.toLocaleString('pl-PL') + SETTINGS.currency + '</span><span class="price-disc">' + price.toLocaleString('pl-PL') + SETTINGS.currency + '</span>'
          : price.toLocaleString('pl-PL') + SETTINGS.currency;
      const cls = (unavail ? ' unavail' : '') + (qty[item.id] > 0 ? ' active' : '');
      return '<div class="item-card' + cls + '" id="card_' + item.id + '">'
        + '<div class="item-info"><div class="item-name"><span class="item-emoji">' + item.emoji + '</span>' + item.name + '</div>'
        + '<div class="item-price">' + priceHtml + '</div></div>'
        + '<div class="qty-ctrl">'
        + '<button class="qty-btn" onclick="change(\'' + item.id + '\',-1)">&#x2212;</button>'
        + '<span class="qty-num" id="q_' + item.id + '">' + qty[item.id] + '</span>'
        + '<button class="qty-btn" onclick="change(\'' + item.id + '\',1)">+</button>'
        + '</div></div>';
    }).join('')
    + '</div>';
}

/* ── Change handlers ── */
function change(id, delta) {
  qty[id] = Math.max(0, qty[id] + delta);
  const el = document.getElementById('q_' + id); if (el) el.textContent = qty[id];
  const card = document.getElementById('card_' + id); if (card) card.classList.toggle('active', qty[id] > 0);
  update();
}

function changeSpQty(spId, delta) {
  const sp = SPECIAL.find(s => s.id === spId);
  const st = spState[spId];
  const min = Math.max(1, sp.minQty);
  const newQty = st.qty + delta;
  if (newQty < min) return;
  if (sp.maxQty > 0 && newQty > sp.maxQty) return;
  st.qty = newQty;
  renderArea();
  update();
}

function selectSpItem(spId, itemId) {
  spState[spId].selectedItem = itemId;
  renderArea();
  update();
}

/* ── Build strings ── */
function buildStrings() {
  let orderParts = [], total = 0;

  if (mode.type === 'special') {
    const sp = mode.data;
    const st = spState[sp.id];
    const selectedItem = sp.items.find(it => it.id === st.selectedItem) || sp.items[0];
    const unitPrice = getSpPrice(sp, st.qty);
    total = unitPrice * st.qty;
    if (selectedItem && st.qty > 0) {
      orderParts.push(st.qty + 'x ' + selectedItem.name + ' ' + sp.name);
    }
  } else {
    MENU.forEach(item => {
      const p = getPrice(item);
      if (p !== null && qty[item.id] > 0) {
        orderParts.push(qty[item.id] + 'x ' + getLabel(item));
        total += qty[item.id] * p;
      }
    });
  }

  const hasItems = orderParts.length > 0 && total >= 0;
  const orderStr = orderParts.join(', ');
  const priceStr = total.toLocaleString('pl-PL') + SETTINGS.currency;
  return { hasItems, orderStr, priceStr, total };
}

/* ── Update UI ── */
function update() {
  const { hasItems, orderStr, priceStr, total } = buildStrings();
  document.getElementById('orderText').innerHTML = hasItems ? orderStr : '<span style="color:var(--muted);font-style:italic;font-size:12px;">Dodaj pozycje...</span>';
  document.getElementById('priceText').innerHTML = hasItems ? priceStr : '<span style="color:var(--muted);font-style:italic;font-size:12px;">0' + SETTINGS.currency + '</span>';
  document.getElementById('totalVal').textContent = total.toLocaleString('pl-PL') + SETTINGS.currency;
  ['copyOrderBtn','copyPriceBtn','copyAllBtn'].forEach(id => { document.getElementById(id).disabled = !hasItems; });
}

/* ── Copy ── */
function flash(id, label) {
  const btn = document.getElementById(id);
  const orig = btn.textContent; btn.textContent = label; btn.classList.add('done');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 2000);
}
function copyText(text, btnId, label) {
  const done = () => flash(btnId, label);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, btnId, label));
  } else { fallbackCopy(text, btnId, label); }
}
function fallbackCopy(text, btnId, label) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); flash(btnId, label); } catch(e) { alert('Skopiuj recznie:\n' + text); }
  document.body.removeChild(ta);
}
function copyField(type) {
  const { orderStr, priceStr } = buildStrings();
  copyText(type === 'order' ? orderStr : priceStr, type === 'order' ? 'copyOrderBtn' : 'copyPriceBtn', '\u2713 Skopiowano!');
}
function copyAll() {
  const { orderStr, priceStr } = buildStrings();
  copyText(orderStr + SETTINGS.copyAllSeparator + priceStr, 'copyAllBtn', '\u2713 Skopiowano wszystko!');
}

/* ── Reset ── */
function resetOrder() {
  MENU.forEach(i => {
    qty[i.id] = 0;
    const el = document.getElementById('q_' + i.id); if (el) el.textContent = '0';
    const card = document.getElementById('card_' + i.id); if (card) card.classList.remove('active');
  });
  SPECIAL.forEach(sp => { spState[sp.id].qty = Math.max(1, sp.minQty); });
  renderArea(); update();
}

/* ── Theme ── */
function toggleTheme() {
  light = !light;
  document.body.classList.toggle('light', light);
  document.getElementById('themeBtn').textContent = light ? '\uD83C\uDF19 Ciemny' : '\u2600\uFE0F Jasny';
}

/* ── Init ── */
buildTabBar();
renderArea();
update();
</script>
