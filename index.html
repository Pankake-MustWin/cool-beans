<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Beans — Kalkulator zamówień</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<script>
/* ============================================================
   EDYTUJ TUTAJ — Cennik i znizki
   ============================================================

   MENU — pozycje dostepne dla wszystkich
   Kazda pozycja: { id, name, price, emoji }
   - id:     unikalny klucz (bez polskich liter, bez spacji)
   - name:   nazwa wyswietlana
   - price:  cena (liczba)
   - emoji:  ikonka

   COMPANIES — firmy ze znizka
   Kazda firma:
   {
     id:        unikalny klucz firmy
     name:      nazwa wyswietlana (np. "LSC")
     suffix:    dopisek na fakturze (tylko dla pozycji ze znizka)
     discounts: { id_pozycji: cena_po_znizce, ... }

   JAK DZIALA:
   - Pozycja W discounts  = pokazuje znizke + dopisuje suffix na fakturze
   - Pozycja BEZ wpisu   = normalna cena, BEZ dopisku (dostepna jak zawsze)
   - Zeby ZABLOKOWAC pozycje dla firmy — wpisz null:  slodziak: null

   Zeby DODAC firme — skopiuj blok { id, name, suffix, discounts }
   i dopisz go do tablicy COMPANIES (oddziel przecinkiem).
   ============================================================ */

const MENU = [
  { id: 'standard',  name: 'Standard',  price: 800,  emoji: '\u2B50' },
  { id: 'slodziak',  name: 'Slodziak',  price: 1500, emoji: '\uD83C\uDF6C' },
  { id: 'pracus',    name: 'Pracus',    price: 1300, emoji: '\uD83D\uDCBC' },
  { id: 'gagatek',   name: 'Gagatek',   price: 1300, emoji: '\uD83D\uDE0E' },
  { id: 'ciastko',   name: 'Ciastko',   price: 900,  emoji: '\uD83C\uDF6A' },
  { id: 'koktajl',   name: 'Koktajl',   price: 900,  emoji: '\uD83E\uDD64' },
  { id: 'tost',      name: 'Tost',      price: 450,  emoji: '\uD83C\uDF5E' },
  { id: 'smoothie',  name: 'Smoothie',  price: 450,  emoji: '\uD83E\uDD64' },
];

const COMPANIES = [
  /* ----------- LSC ----------- */
  {
    id:      'lsc',
    name:    'LSC',
    suffix:  'LSC',
    discounts: {
      standard: 400,
      pracus:   650,
      gagatek:  650,
    }
  },

  /* --- PRZYKLAD nowej firmy --- odkomentuj i wypelnij ---
  {
    id:     'xyz',
    name:   'XYZ Corp',
    suffix: 'XYZ',
    discounts: {
      ciastko:  700,
      smoothie: 350,
    }
  },
  ------------------------------------------------------- */
];

const SETTINGS = {
  currency:          '$',
  copyAllSeparator:  ' - ',
  useDiscountWord:   false,    // false = "1x Standard LSC"  |  true = "1x Standard znizka LSC"
  discountWord:      'znizka',
};
</script>

<style>
  :root {
    --pink:          #e8a0c8;
    --pink-dark:     #c06090;
    --pink-light:    #f5d0e8;
    --brown:         #6b4423;
    --border:        rgba(180,120,80,0.2);
    --text:          #3a2010;
    --muted:         #9a7060;
    --shadow:        rgba(180,100,60,0.1);
    --accent:        #d4608a;
    --bg1:           #fdf6ee;
    --glass:         rgba(255,255,255,0.55);
    --glass-border:  rgba(255,255,255,0.7);
    --success:       #5a9e6a;
    --disc-bg:       rgba(100,180,120,0.12);
    --disc-border:   rgba(80,160,100,0.35);
    --disc-text:     #2a6a40;
  }
  .dark {
    --pink:          #e890c0;
    --pink-dark:     #b05080;
    --pink-light:    #5a2840;
    --brown:         #c8a080;
    --border:        rgba(220,160,100,0.18);
    --text:          #f0e0c8;
    --muted:         #b09080;
    --shadow:        rgba(0,0,0,0.4);
    --accent:        #f08ab8;
    --bg1:           #120a05;
    --glass:         rgba(30,15,8,0.65);
    --glass-border:  rgba(255,200,150,0.12);
    --success:       #6ab87a;
    --disc-bg:       rgba(60,120,80,0.2);
    --disc-border:   rgba(100,200,130,0.3);
    --disc-text:     #88e8a8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg1);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(232,160,200,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(212,165,100,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 30%, rgba(245,208,232,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 500px; margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 1.25rem; position: relative; }

  .theme-btn {
    position: absolute; right: 0; top: 0;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 2rem; padding: 6px 14px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    backdrop-filter: blur(10px); transition: all 0.2s;
  }
  .theme-btn:hover { color: var(--accent); border-color: var(--accent); }

  .logo-cool {
    font-family: 'Pacifico', cursive;
    font-size: 3rem; color: var(--pink); line-height: 1; display: block;
    text-shadow: 3px 3px 0 var(--brown), 1px 1px 0 rgba(0,0,0,0.15);
  }
  .logo-beans {
    display: inline-block;
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(8px); border-radius: 2rem;
    padding: 3px 20px; font-size: 0.7rem; letter-spacing: 0.45em;
    text-transform: uppercase; color: var(--brown); font-weight: 800; margin-top: 3px;
  }
  .tagline { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; margin-top: 0.4rem; }

  .sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    margin: 1rem 0; opacity: 0.5;
  }

  .section-label {
    font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.6rem; font-weight: 800; padding-left: 2px;
  }

  /* Company bar */
  .company-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .company-chip {
    padding: 6px 16px; border-radius: 2rem;
    border: 1.5px solid var(--border);
    background: var(--glass); backdrop-filter: blur(8px);
    font-size: 12px; font-weight: 800; color: var(--muted);
    cursor: pointer; transition: all 0.18s; font-family: 'Nunito', sans-serif;
  }
  .company-chip:hover { border-color: var(--pink); color: var(--pink-dark); }
  .company-chip.active-normal {
    background: rgba(232,160,200,0.18);
    border-color: var(--pink); color: var(--pink-dark);
  }
  .company-chip.active-company {
    background: var(--disc-bg);
    border-color: var(--disc-border); color: var(--disc-text);
  }

  /* Menu */
  .menu-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 1rem;
  }

  .item-card {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 10px 10px 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px); box-shadow: 0 2px 14px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s; gap: 6px;
  }
  .item-card:not(.unavailable):hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
  .item-card.active { border-color: var(--pink); box-shadow: 0 0 0 2px rgba(232,160,200,0.3), 0 4px 16px var(--shadow); }
  .item-card.unavailable { opacity: 0.28; pointer-events: none; }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-emoji { font-size: 13px; margin-right: 3px; }
  .item-price { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 600; }
  .price-orig { text-decoration: line-through; opacity: 0.5; margin-right: 4px; }
  .price-disc { color: var(--disc-text); font-weight: 800; }

  .qty-ctrl { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .qty-btn {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid var(--pink); background: transparent; color: var(--pink-dark);
    font-size: 15px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-family: 'Nunito', sans-serif; font-weight: 800; padding: 0;
  }
  .qty-btn:hover { background: var(--pink); color: white; }
  .qty-btn:active { transform: scale(0.9); }
  .qty-num { min-width: 16px; text-align: center; font-size: 14px; font-weight: 800; color: var(--text); }

  /* Summary */
  .summary-box {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 1.1rem 1.2rem;
    backdrop-filter: blur(16px); box-shadow: 0 4px 24px var(--shadow);
    margin-bottom: 0.75rem;
  }
  .summary-label { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); font-weight: 800; margin-bottom: 0.6rem; }

  .copy-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .copy-field-wrap { flex: 1; min-width: 0; }
  .copy-field-title { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }

  .copy-block {
    background: rgba(0,0,0,0.04); border: 1px dashed var(--border);
    border-radius: 10px; padding: 9px 11px;
    font-family: 'Courier New', monospace; font-size: 12.5px;
    color: var(--text); line-height: 1.5; min-height: 38px;
    word-break: break-word; margin-bottom: 8px;
  }
  .dark .copy-block { background: rgba(255,255,255,0.04); }

  .mini-copy-btn {
    width: 100%; padding: 9px 8px; border-radius: 10px;
    border: none; background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: white; font-size: 12px; font-weight: 800;
    font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.2s; text-align: center;
    box-shadow: 0 3px 10px rgba(208,96,138,0.3);
  }
  .mini-copy-btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(208,96,138,0.4); }
  .mini-copy-btn:active { transform: scale(0.97); }
  .mini-copy-btn:disabled { opacity: 0.35; cursor: default; box-shadow: none; }
  .mini-copy-btn.done { background: linear-gradient(135deg, var(--success), #3d7a4f) !important; box-shadow: none !important; }

  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 0.7rem; border-top: 1px solid var(--border); margin-top: 0.2rem;
  }
  .total-label { font-size: 13px; color: var(--muted); font-weight: 700; }
  .total-value { font-size: 24px; font-weight: 800; color: var(--accent); }

  .btn-copy-all {
    width: 100%; padding: 12px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: white; font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(208,96,138,0.35); margin-bottom: 8px;
  }
  .btn-copy-all:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(208,96,138,0.4); }
  .btn-copy-all:disabled { opacity: 0.4; cursor: default; }
  .btn-copy-all.done { background: linear-gradient(135deg, var(--success), #3d7a4f) !important; }

  .btn-reset {
    width: 100%; padding: 9px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; font-weight: 700;
    font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .btn-reset:hover { color: var(--accent); border-color: var(--accent); }

  .bean-deco { text-align: center; margin-top: 2rem; font-size: 18px; opacity: 0.25; letter-spacing: 6px; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#127769; Ciemny</button>
    <span class="logo-cool">Cool</span>
    <span class="logo-beans">Beans</span>
    <div class="tagline">&#9749; kalkulator zamowie&#324;</div>
  </div>

  <div class="sep"></div>

  <div class="section-label">&#x1F3E2; Tryb zam&#xF3;wienia</div>
  <div class="company-bar" id="companyBar"></div>

  <div class="sep"></div>

  <div class="section-label" id="menuLabel">&#9749; Menu</div>
  <div class="menu-grid" id="menuGrid"></div>

  <div class="sep"></div>

  <div class="summary-box">
    <div class="summary-label">&#x1F4CB; Podsumowanie</div>
    <div class="copy-row">
      <div class="copy-field-wrap">
        <div class="copy-field-title">&#x1F6D2; Zam&#xF3;wienie</div>
        <div class="copy-block" id="orderText"><span style="color:var(--muted);font-style:italic;font-size:12px;">Dodaj pozycje...</span></div>
        <button class="mini-copy-btn" id="copyOrderBtn" onclick="copyField('order')" disabled>Kopiuj zam&#xF3;wienie</button>
      </div>
      <div class="copy-field-wrap">
        <div class="copy-field-title">&#x1F4B0; Kwota</div>
        <div class="copy-block" id="priceText"><span style="color:var(--muted);font-style:italic;font-size:12px;">0$</span></div>
        <button class="mini-copy-btn" id="copyPriceBtn" onclick="copyField('price')" disabled>Kopiuj kwot&#x119;</button>
      </div>
    </div>
    <div class="total-row">
      <span class="total-label">Razem do zap&#x142;aty:</span>
      <span class="total-value" id="totalVal">0$</span>
    </div>
  </div>

  <button class="btn-copy-all" id="copyAllBtn" onclick="copyAll()" disabled>Kopiuj wszystko razem</button>
  <button class="btn-reset" onclick="resetOrder()">Wyczy&#x15B;&#x107; zam&#xF3;wienie</button>

  <div class="bean-deco">&#9749; &#9749; &#9749;</div>
</div>

<script>
/* ── State ── */
const qty = {};
let activeCompany = null;
let dark = false;
MENU.forEach(i => { qty[i.id] = 0; });

/* ── Helpers ── */
function getPrice(item) {
  if (!activeCompany) return item.price;
  const d = activeCompany.discounts;
  if (!Object.prototype.hasOwnProperty.call(d, item.id)) return item.price; // brak wpisu = normalna cena
  if (d[item.id] === null) return null; // null = zablokowana
  return d[item.id]; // znizka
}

function hasDiscount(item) {
  if (!activeCompany) return false;
  const d = activeCompany.discounts;
  return Object.prototype.hasOwnProperty.call(d, item.id) && d[item.id] !== null;
}

function getLabel(item) {
  if (!activeCompany) return item.name;
  if (!hasDiscount(item)) return item.name; // brak znizki = brak dopisku
  const suf = activeCompany.suffix;
  return SETTINGS.useDiscountWord
    ? item.name + ' ' + SETTINGS.discountWord + ' ' + suf
    : item.name + ' ' + suf;
}

/* ── Company bar ── */
function buildCompanyBar() {
  const bar = document.getElementById('companyBar');
  let html = '<button class="company-chip active-normal" id="chip_normal" onclick="setCompany(null)">Normalny</button>';
  COMPANIES.forEach(c => {
    html += '<button class="company-chip" id="chip_' + c.id + '" onclick="setCompany(\'' + c.id + '\')">' + c.name + '</button>';
  });
  bar.innerHTML = html;
}

function setCompany(id) {
  activeCompany = id ? COMPANIES.find(c => c.id === id) : null;
  document.querySelectorAll('.company-chip').forEach(el => {
    el.classList.remove('active-normal', 'active-company');
  });
  if (id) {
    document.getElementById('chip_' + id).classList.add('active-company');
  } else {
    document.getElementById('chip_normal').classList.add('active-normal');
  }
  document.getElementById('menuLabel').textContent = activeCompany
    ? '\u2615 Menu \u2014 ' + activeCompany.name
    : '\u2615 Menu';
  MENU.forEach(item => { if (getPrice(item) === null) qty[item.id] = 0; });
  buildMenu();
  update();
}

/* ── Menu ── */
function buildMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = MENU.map(item => {
    const price = getPrice(item);
    const unavail = price === null;
    const disc = hasDiscount(item);
    let priceHtml;
    if (unavail) {
      priceHtml = '<span style="font-style:italic;opacity:0.5">niedost\u0119pne</span>';
    } else if (disc) {
      priceHtml = '<span class="price-orig">' + item.price.toLocaleString('pl-PL') + SETTINGS.currency + '</span>'
               + '<span class="price-disc">' + price.toLocaleString('pl-PL') + SETTINGS.currency + '</span>';
    } else {
      priceHtml = price.toLocaleString('pl-PL') + SETTINGS.currency;
    }
    const activeClass = qty[item.id] > 0 ? ' active' : '';
    const unavailClass = unavail ? ' unavailable' : '';
    return '<div class="item-card' + activeClass + unavailClass + '" id="card_' + item.id + '">'
      + '<div class="item-info">'
      + '<div class="item-name"><span class="item-emoji">' + item.emoji + '</span>' + item.name + '</div>'
      + '<div class="item-price">' + priceHtml + '</div>'
      + '</div>'
      + '<div class="qty-ctrl">'
      + '<button class="qty-btn" onclick="change(\'' + item.id + '\',-1)">\u2212</button>'
      + '<span class="qty-num" id="q_' + item.id + '">' + qty[item.id] + '</span>'
      + '<button class="qty-btn" onclick="change(\'' + item.id + '\',1)">+</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

function change(id, delta) {
  qty[id] = Math.max(0, qty[id] + delta);
  const el = document.getElementById('q_' + id);
  if (el) el.textContent = qty[id];
  const card = document.getElementById('card_' + id);
  if (card) card.classList.toggle('active', qty[id] > 0);
  update();
}

/* ── Build strings ── */
function buildStrings() {
  const items = MENU.filter(i => getPrice(i) !== null && qty[i.id] > 0);
  const total = items.reduce((s, i) => s + qty[i.id] * getPrice(i), 0);
  const orderStr = items.map(i => qty[i.id] + 'x ' + getLabel(i)).join(', ');
  const priceStr = total.toLocaleString('pl-PL') + SETTINGS.currency;
  return { items, total, orderStr, priceStr, hasItems: items.length > 0 };
}

/* ── Update UI ── */
function update() {
  const { hasItems, orderStr, priceStr, total } = buildStrings();
  document.getElementById('orderText').innerHTML = hasItems
    ? orderStr
    : '<span style="color:var(--muted);font-style:italic;font-size:12px;">Dodaj pozycje...</span>';
  document.getElementById('priceText').innerHTML = hasItems
    ? priceStr
    : '<span style="color:var(--muted);font-style:italic;font-size:12px;">0' + SETTINGS.currency + '</span>';
  document.getElementById('totalVal').textContent = total.toLocaleString('pl-PL') + SETTINGS.currency;
  ['copyOrderBtn','copyPriceBtn','copyAllBtn'].forEach(id => {
    document.getElementById(id).disabled = !hasItems;
  });
}

/* ── Copy ── */
function flash(id, label) {
  const btn = document.getElementById(id);
  const orig = btn.textContent;
  btn.textContent = label;
  btn.classList.add('done');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 2000);
}

function copyText(text, btnId, label) {
  const done = () => flash(btnId, label);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, btnId, label));
  } else {
    fallbackCopy(text, btnId, label);
  }
}

function fallbackCopy(text, btnId, label) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); flash(btnId, label); } catch(e) { alert('Skopiuj recznie: ' + text); }
  document.body.removeChild(ta);
}

function copyField(type) {
  const { orderStr, priceStr } = buildStrings();
  const text = type === 'order' ? orderStr : priceStr;
  const btnId = type === 'order' ? 'copyOrderBtn' : 'copyPriceBtn';
  copyText(text, btnId, '\u2713 Skopiowano!');
}

function copyAll() {
  const { orderStr, priceStr } = buildStrings();
  copyText(orderStr + SETTINGS.copyAllSeparator + priceStr, 'copyAllBtn', '\u2713 Skopiowano wszystko!');
}

/* ── Reset ── */
function resetOrder() {
  MENU.forEach(i => {
    qty[i.id] = 0;
    const el = document.getElementById('q_' + i.id);
    if (el) el.textContent = '0';
    const card = document.getElementById('card_' + i.id);
    if (card) card.classList.remove('active');
  });
  update();
}

/* ── Theme ── */
function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  document.getElementById('themeBtn').textContent = dark ? '\u2600\uFE0F Jasny' : '\uD83C\uDF19 Ciemny';
}

/* ── Init ── */
buildCompanyBar();
buildMenu();
update();
</script>
</body>
</html>
