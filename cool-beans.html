<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Beans — Kalkulator zamówień</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e8a0c8;
    --pink-dark: #c06090;
    --pink-light: #f5d0e8;
    --brown: #6b4423;
    --cream: #fdf6ee;
    --card: rgba(255,255,255,0.6);
    --border: rgba(180,120,80,0.2);
    --text: #3a2010;
    --muted: #9a7060;
    --shadow: rgba(180,100,60,0.1);
    --accent: #d4608a;
    --bg1: #fdf6ee;
    --bg2: #f5e8d8;
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.7);
    --success: #5a9e6a;
  }
  .dark {
    --pink: #e890c0;
    --pink-dark: #b05080;
    --pink-light: #5a2840;
    --brown: #c8a080;
    --cream: #1a0f0a;
    --card: rgba(40,18,10,0.7);
    --border: rgba(220,160,100,0.18);
    --text: #f0e0c8;
    --muted: #b09080;
    --shadow: rgba(0,0,0,0.4);
    --accent: #f08ab8;
    --bg1: #120a05;
    --bg2: #1e1008;
    --glass: rgba(30,15,8,0.65);
    --glass-border: rgba(255,200,150,0.12);
    --success: #6ab87a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg1);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(232,160,200,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(212,165,100,0.2) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 30%, rgba(245,208,232,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .dark body::before {
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(180,60,120,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(120,70,30,0.2) 0%, transparent 70%);
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 1.5rem;
    position: relative;
  }
  .theme-btn {
    position: absolute;
    right: 0;
    top: 0;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 2rem;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .theme-btn:hover { color: var(--accent); border-color: var(--accent); }

  .logo-wrap {
    display: inline-block;
    margin-bottom: 0.25rem;
  }
  .logo-cool {
    font-family: 'Pacifico', cursive;
    font-size: 3.2rem;
    color: var(--pink);
    line-height: 1;
    text-shadow: 3px 3px 0 var(--brown), 1px 1px 0 rgba(0,0,0,0.2);
    display: block;
  }
  .logo-beans {
    display: inline-block;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(8px);
    border-radius: 2rem;
    padding: 4px 20px;
    font-size: 0.75rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--brown);
    font-weight: 800;
    margin-top: 2px;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.5rem;
  }

  /* Separator */
  .sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    margin: 1.2rem 0;
    opacity: 0.5;
  }

  /* Section */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
    font-weight: 800;
    padding-left: 2px;
  }

  /* Menu grid */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .item-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 10px 10px 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 14px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    gap: 6px;
  }
  .item-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
  .item-card.active {
    border-color: var(--pink);
    box-shadow: 0 0 0 2px rgba(232,160,200,0.3), 0 4px 16px var(--shadow);
  }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-emoji { font-size: 14px; margin-right: 3px; }
  .item-price {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    font-weight: 600;
  }

  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--pink);
    background: transparent;
    color: var(--pink-dark);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    padding: 0;
  }
  .qty-btn:hover { background: var(--pink); color: white; }
  .qty-btn:active { transform: scale(0.9); }
  .qty-num {
    min-width: 16px;
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
  }

  /* Summary box */
  .summary-box {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 1.1rem 1.2rem;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 24px var(--shadow);
    margin-bottom: 0.75rem;
  }

  .summary-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 800;
    margin-bottom: 0.6rem;
  }

  .copy-block {
    background: rgba(0,0,0,0.04);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 9px 11px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    min-height: 36px;
    word-break: break-word;
    margin-bottom: 8px;
  }
  .dark .copy-block { background: rgba(255,255,255,0.04); }

  .copy-block.empty-state {
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  .copy-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .copy-field-wrap { flex: 1; }
  .copy-field-title {
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .mini-copy-btn {
    width: 100%;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    text-align: center;
  }
  .mini-copy-btn:hover { border-color: var(--pink); color: var(--pink-dark); background: var(--pink-light); }
  .mini-copy-btn.done { background: var(--success); color: white; border-color: var(--success); }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 0.7rem;
    border-top: 1px solid var(--border);
    margin-top: 0.2rem;
  }
  .total-label { font-size: 13px; color: var(--muted); font-weight: 700; }
  .total-value { font-size: 24px; font-weight: 800; color: var(--accent); }

  /* Big copy button */
  .btn-copy-all {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: white;
    font-size: 15px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 16px rgba(208, 96, 138, 0.35);
    margin-bottom: 8px;
  }
  .btn-copy-all:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(208,96,138,0.4); }
  .btn-copy-all:active { transform: scale(0.98); }
  .btn-copy-all:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
  .btn-copy-all.done { background: linear-gradient(135deg, var(--success), #3d7a4f); }

  .btn-reset {
    width: 100%;
    padding: 9px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-reset:hover { color: var(--accent); border-color: var(--accent); }

  /* Bean deco */
  .bean-deco {
    text-align: center;
    margin-top: 2rem;
    font-size: 20px;
    opacity: 0.3;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Ciemny</button>
    <div class="logo-wrap">
      <span class="logo-cool">Cool</span>
      <span class="logo-beans">Beans</span>
    </div>
    <div class="tagline">☕ kalkulator zamówień</div>
  </div>

  <div class="sep"></div>

  <div class="section-label">☕ Menu</div>
  <div class="menu-grid" id="menuGrid"></div>

  <div class="sep"></div>

  <div class="summary-box">
    <div class="summary-label">📋 Podsumowanie</div>

    <div class="copy-row">
      <div class="copy-field-wrap">
        <div class="copy-field-title">🛒 Zamówienie</div>
        <div class="copy-block" id="orderText"><span style="color:var(--muted);font-style:italic;font-size:12px;">Dodaj pozycje...</span></div>
        <button class="mini-copy-btn" id="copyOrderBtn" onclick="copyField('order')" disabled>Kopiuj zamówienie</button>
      </div>
      <div class="copy-field-wrap">
        <div class="copy-field-title">💰 Kwota</div>
        <div class="copy-block" id="priceText"><span style="color:var(--muted);font-style:italic;font-size:12px;">0$</span></div>
        <button class="mini-copy-btn" id="copyPriceBtn" onclick="copyField('price')" disabled>Kopiuj kwotę</button>
      </div>
    </div>

    <div class="total-row">
      <span class="total-label">Razem do zapłaty:</span>
      <span class="total-value" id="totalVal">0$</span>
    </div>
  </div>

  <button class="btn-copy-all" id="copyAllBtn" onclick="copyAll()" disabled>
    Kopiuj wszystko razem
  </button>
  <button class="btn-reset" onclick="reset()">Wyczyść zamówienie</button>

  <div class="bean-deco">☕ ☕ ☕</div>
</div>

<script>
const MENU = [
  { id:'standard',  name:'Standard',  price:800,  emoji:'⭐' },
  { id:'slodziak',  name:'Słodziak',  price:1500, emoji:'🍬' },
  { id:'pracus',    name:'Pracuś',    price:1300, emoji:'💼' },
  { id:'gagatek',   name:'Gagatek',   price:1300, emoji:'😎' },
  { id:'ciastko',   name:'Ciastko',   price:900,  emoji:'🍪' },
  { id:'koktajl',   name:'Koktajl',   price:900,  emoji:'🥤' },
  { id:'tost',      name:'Tost',      price:450,  emoji:'🍞' },
  { id:'smoothie',  name:'Smoothie',  price:450,  emoji:'🥤' },
];

const qty = {};
MENU.forEach(i => qty[i.id] = 0);

let dark = false;

function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  document.getElementById('themeBtn').textContent = dark ? '☀️ Jasny' : '🌙 Ciemny';
}

function buildMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = MENU.map(item => `
    <div class="item-card" id="card_${item.id}">
      <div class="item-info">
        <div class="item-name"><span class="item-emoji">${item.emoji}</span>${item.name}</div>
        <div class="item-price">${item.price.toLocaleString('pl-PL')} $</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="change('${item.id}',-1)">−</button>
        <span class="qty-num" id="q_${item.id}">0</span>
        <button class="qty-btn" onclick="change('${item.id}',1)">+</button>
      </div>
    </div>
  `).join('');
}

function change(id, delta) {
  qty[id] = Math.max(0, qty[id] + delta);
  document.getElementById('q_' + id).textContent = qty[id];
  document.getElementById('card_' + id).classList.toggle('active', qty[id] > 0);
  update();
}

function update() {
  const items = MENU.filter(i => qty[i.id] > 0);
  const total = items.reduce((s, i) => s + qty[i.id] * i.price, 0);
  const hasItems = items.length > 0;

  const orderStr = hasItems
    ? items.map(i => qty[i.id] + 'x ' + i.name).join(', ')
    : '';
  const priceStr = hasItems ? total.toLocaleString('pl-PL') + '$' : '';

  document.getElementById('orderText').innerHTML = hasItems
    ? orderStr
    : '<span style="color:var(--muted);font-style:italic;font-size:12px;">Dodaj pozycje...</span>';

  document.getElementById('priceText').innerHTML = hasItems
    ? priceStr
    : '<span style="color:var(--muted);font-style:italic;font-size:12px;">0$</span>';

  document.getElementById('totalVal').textContent = total.toLocaleString('pl-PL') + '$';

  document.getElementById('copyOrderBtn').disabled = !hasItems;
  document.getElementById('copyPriceBtn').disabled = !hasItems;
  document.getElementById('copyAllBtn').disabled = !hasItems;
}

function copyField(type) {
  const items = MENU.filter(i => qty[i.id] > 0);
  const total = items.reduce((s, i) => s + qty[i.id] * i.price, 0);
  let text = '';
  let btnId = '';

  if (type === 'order') {
    text = items.map(i => qty[i.id] + 'x ' + i.name).join(', ');
    btnId = 'copyOrderBtn';
  } else {
    text = total.toLocaleString('pl-PL') + '$';
    btnId = 'copyPriceBtn';
  }

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = '✓ Skopiowano!';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 2000);
  });
}

function copyAll() {
  const items = MENU.filter(i => qty[i.id] > 0);
  const total = items.reduce((s, i) => s + qty[i.id] * i.price, 0);
  const order = items.map(i => qty[i.id] + 'x ' + i.name).join(', ');
  const text = order + ' - ' + total.toLocaleString('pl-PL') + '$';

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyAllBtn');
    btn.textContent = '✓ Skopiowano wszystko!';
    btn.classList.add('done');
    setTimeout(() => {
      btn.textContent = 'Kopiuj wszystko razem';
      btn.classList.remove('done');
    }, 2000);
  });
}

function reset() {
  MENU.forEach(i => {
    qty[i.id] = 0;
    const el = document.getElementById('q_' + i.id);
    if (el) el.textContent = '0';
    document.getElementById('card_' + i.id).classList.remove('active');
  });
  update();
}

buildMenu();
update();
</script>
</body>
</html>
