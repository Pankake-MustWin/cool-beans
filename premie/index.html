<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoolBeans — Kalkulator Premii</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:#e8a0c8;--pink-dark:#c06090;--border:rgba(180,120,80,0.2);--text:#3a2010;
    --muted:#9a7060;--shadow:rgba(180,100,60,0.1);--accent:#d4608a;--bg1:#fdf6ee;
    --glass:rgba(255,255,255,0.55);--glass-border:rgba(255,255,255,0.7);
    --gold:#c9960c;--gold-bg:rgba(210,170,20,0.12);--gold-border:rgba(210,170,20,0.4);
    --blue:#4a90d9;--blue-bg:rgba(74,144,217,0.10);--blue-border:rgba(74,144,217,0.35);
    --brown:#6b4423;
  }
  .dark {
    --pink:#e890c0;--pink-dark:#b05080;--border:rgba(220,160,100,0.18);--text:#f0e0c8;
    --muted:#b09080;--shadow:rgba(0,0,0,0.4);--accent:#f08ab8;--bg1:#120a05;
    --glass:rgba(30,15,8,0.65);--glass-border:rgba(255,200,150,0.12);
    --gold:#e8b830;--gold-bg:rgba(232,184,48,0.10);--gold-border:rgba(232,184,48,0.3);
    --blue:#6aabf0;--blue-bg:rgba(106,171,240,0.08);--blue-border:rgba(106,171,240,0.3);
    --brown:#c8a080;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(232,160,200,.22) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(212,165,100,.18) 0%,transparent 70%);pointer-events:none;z-index:0}
  .wrapper{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:1.5rem 1rem 3rem}
  .header{text-align:center;margin-bottom:1.25rem;position:relative}
  .theme-btn{position:absolute;right:0;top:0;background:var(--glass);border:1px solid var(--glass-border);border-radius:2rem;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;backdrop-filter:blur(10px);transition:all .2s}
  .theme-btn:hover{color:var(--accent);border-color:var(--accent)}
  .logo-main{font-family:'Pacifico',cursive;font-size:2.8rem;color:var(--pink);line-height:1;display:block;text-shadow:3px 3px 0 var(--brown),1px 1px 0 rgba(0,0,0,.15)}
  .logo-sub{display:inline-block;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(8px);border-radius:2rem;padding:3px 20px;font-size:.7rem;letter-spacing:.45em;text-transform:uppercase;color:var(--brown);font-weight:800;margin-top:3px}
  .tagline{font-size:11px;color:var(--muted);letter-spacing:.08em;margin-top:.4rem}
  .sep{height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:1rem 0;opacity:.5}
  .section-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;font-weight:800;padding-left:2px}
  .glass-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:1.1rem 1.2rem;backdrop-filter:blur(16px);box-shadow:0 4px 24px var(--shadow);margin-bottom:.75rem}
  .pools-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem}
  .pool-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:.9rem 1rem;backdrop-filter:blur(12px);box-shadow:0 2px 12px var(--shadow)}
  .pool-card.pool-courses{border-color:var(--gold-border);background:var(--gold-bg)}
  .pool-card.pool-invoices{border-color:var(--blue-border);background:var(--blue-bg)}
  .pool-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;font-weight:800;margin-bottom:6px}
  .pool-card.pool-courses .pool-title{color:var(--gold)}
  .pool-card.pool-invoices .pool-title{color:var(--blue)}
  .pool-input{width:100%;background:rgba(0,0,0,.05);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--text);outline:none;transition:border .2s}
  .dark .pool-input{background:rgba(255,255,255,.05)}
  .pool-card.pool-courses .pool-input:focus{border-color:var(--gold)}
  .pool-card.pool-invoices .pool-input:focus{border-color:var(--blue)}
  .add-grid{display:grid;grid-template-columns:1fr 72px 72px auto;gap:6px;align-items:end;margin-bottom:6px}.add-col{display:flex;flex-direction:column;gap:4px}
  .input-field{background:rgba(0,0,0,.04);border:1px solid var(--border);border-radius:10px;padding:9px 11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);outline:none;transition:border .2s;width:100%}
  .dark .input-field{background:rgba(255,255,255,.05)}
  .input-field:focus{border-color:var(--pink)}
  .col-hints{display:grid;grid-template-columns:1fr 72px 72px auto;gap:6px;padding:0 2px;margin-top:3px}
  .col-hint{font-size:9px;color:var(--muted);letter-spacing:.06em;text-align:center;padding:0 2px}
  .col-hint:first-child{text-align:left}
  .btn-add{padding:9px 12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .18s;white-space:nowrap;box-shadow:0 3px 10px rgba(208,96,138,.3)}
  .btn-add:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(208,96,138,.4)}
  .btn-add:active{transform:scale(.97)}
  .people-list{display:flex;flex-direction:column;gap:6px}
  .person-item{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.03);border:1px dashed var(--border);border-radius:12px;padding:8px 12px;transition:border-color .2s}
  .dark .person-item{background:rgba(255,255,255,.03)}
  .person-item:hover{border-color:var(--pink)}
  .person-info{flex:1;min-width:0}
  .person-name{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .person-meta{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
  .person-actions{display:flex;gap:4px;flex-shrink:0}
  .btn-icon{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--muted)}
  .btn-icon:hover{border-color:var(--accent);color:var(--accent)}
  .btn-icon.del:hover{border-color:#e05050;color:#e05050}
  .person-item.editing{flex-direction:column;align-items:stretch;border-color:var(--pink);background:rgba(232,160,200,.06)}
  .edit-grid{display:grid;grid-template-columns:1fr 72px 72px auto;gap:6px;align-items:center}
  .edit-grid .input-field{font-size:13px;padding:7px 10px}
  .btn-calc{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(208,96,138,.35);margin-bottom:8px}
  .btn-calc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(208,96,138,.4)}
  .btn-calc:active{transform:scale(.98)}
  .btn-calc:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
  .btn-reset{width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
  .btn-reset:hover{color:var(--accent);border-color:var(--accent)}
  .results-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .top-panel{border-radius:18px;padding:1rem;backdrop-filter:blur(14px);box-shadow:0 3px 18px var(--shadow)}
  .top-panel.courses{background:var(--gold-bg);border:1px solid var(--gold-border)}
  .top-panel.invoices{background:var(--blue-bg);border:1px solid var(--blue-border)}
  .top-panel-title{font-size:10px;letter-spacing:.35em;text-transform:uppercase;font-weight:800;margin-bottom:8px}
  .top-panel.courses .top-panel-title{color:var(--gold)}
  .top-panel.invoices .top-panel-title{color:var(--blue)}
  .result-entry{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);animation:fadeUp .3s ease both}
  .result-entry:last-child{border-bottom:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .re-rank{font-size:18px;min-width:24px;text-align:center}
  .re-info{flex:1;min-width:0}
  .re-name{font-size:12px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .re-detail{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px}
  .re-amount{font-size:14px;font-weight:800;white-space:nowrap}
  .top-panel.courses .re-amount{color:var(--gold)}
  .top-panel.invoices .re-amount{color:var(--blue)}
  .panel-total{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border);margin-top:4px}
  .panel-total-label{font-size:10px;color:var(--muted);font-weight:700}
  .panel-total-val{font-size:16px;font-weight:800}
  .top-panel.courses .panel-total-val{color:var(--gold)}
  .top-panel.invoices .panel-total-val{color:var(--blue)}
  .summary-combined{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:.9rem 1.1rem;backdrop-filter:blur(14px);box-shadow:0 3px 16px var(--shadow);margin-top:10px}
  .summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
  .summary-row:last-child{border-bottom:none}
  .sr-name{font-size:13px;font-weight:800;color:var(--text)}
  .sr-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .sr-tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.05em}
  .sr-tag.c{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
  .sr-tag.i{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
  .sr-total{font-size:15px;font-weight:800;color:var(--accent)}
  .empty-hint{text-align:center;color:var(--muted);font-size:12px;font-style:italic;padding:1rem 0}
  .deco{text-align:center;margin-top:2rem;font-size:18px;opacity:.25;letter-spacing:6px}
  @media(max-width:420px){
    .add-grid,.col-hints,.edit-grid{grid-template-columns:1fr 60px 60px auto}
    .results-cols,.pools-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Ciemny</button>
    <span class="logo-main">Cool</span>
    <span class="logo-sub">Beans</span>
    <div class="tagline">💰 Kalkulator Premi</div>
  </div>
  <div class="sep"></div>

  <div class="section-label">💵 Pule premii</div>
  <div class="pools-row">
    <div class="pool-card pool-courses">
      <div class="pool-title">🏫 TOP 3 Kursy</div>
      <input class="pool-input" id="poolCourses" type="number" min="0" step="0.01" value="120000">
    </div>
    <div class="pool-card pool-invoices">
      <div class="pool-title">🧾 TOP 3 Faktury</div>
      <input class="pool-input" id="poolInvoices" type="number" min="0" step="0.01" value="120000">
    </div>
  </div>
  <div class="sep"></div>

  <div class="section-label">👤 Dodaj pracowników</div>
  <div class="glass-card">
    <div class="add-grid">
      <div class="add-col">
        <input class="input-field" id="newName" type="text" placeholder="Imię i nazwisko" maxlength="60">
        <span class="col-hint" style="text-align:left">Imię i nazwisko</span>
      </div>
      <div class="add-col">
        <input class="input-field" id="newCourses" type="number" min="0" step="1" placeholder="0">
        <span class="col-hint">Kursy</span>
      </div>
      <div class="add-col">
        <input class="input-field" id="newInvoices" type="number" min="0" step="1" placeholder="0">
        <span class="col-hint">Faktury</span>
      </div>
      <button class="btn-add" onclick="addPerson()">+ Dodaj</button>
    </div>
  </div>

  <div class="section-label">📋 Pracownicy</div>
  <div class="glass-card">
    <div class="people-list" id="peopleList">
      <div class="empty-hint">Brak uczestników — dodaj pierwszą osobę powyżej.</div>
    </div>
  </div>
  <div class="sep"></div>

  <button class="btn-calc" id="calcBtn" onclick="calculate()" disabled>🧮 Oblicz podział premii</button>
  <button class="btn-reset" onclick="resetAll()">🗑️ Wyczyść wszystko</button>

  <div id="resultsSection" style="display:none">
    <div class="sep"></div>
    <div class="section-label">🏆 Wyniki</div>
    <div class="results-cols">
      <div class="top-panel courses">
        <div class="top-panel-title">🏫 TOP 3 Kursy</div>
        <div id="resCourses"></div>
        <div class="panel-total">
          <span class="panel-total-label">Pula:</span>
          <span class="panel-total-val" id="totalCourses"></span>
        </div>
      </div>
      <div class="top-panel invoices">
        <div class="top-panel-title">🧾 TOP 3 Faktury</div>
        <div id="resInvoices"></div>
        <div class="panel-total">
          <span class="panel-total-label">Pula:</span>
          <span class="panel-total-val" id="totalInvoices"></span>
        </div>
      </div>
    </div>
    <div class="summary-combined">
      <div class="section-label" style="margin-bottom:8px">📊 Zestawienie łączne</div>
      <div id="summaryRows"></div>
    </div>
  </div>
  <div class="deco">💰 💰 💰</div>
</div>
 <footer>
<center><span style="font-size: xx-small">By Narti 780889041259724831</span></center>
</footer>
<script>
let people=[],dark=false,nextId=1;
const EM=['🥇','🥈','🥉'];

function addPerson(){
  const name=document.getElementById('newName').value.trim();
  const courses=parseInt(document.getElementById('newCourses').value)||0;
  const invoices=parseInt(document.getElementById('newInvoices').value)||0;
  if(!name){shake('newName');return;}
  people.push({id:nextId++,name,courses,invoices});
  ['newName','newCourses','newInvoices'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('newName').focus();
  renderPeople();updateCalcBtn();
  document.getElementById('resultsSection').style.display='none';
}

function shake(id){
  const el=document.getElementById(id);
  el.style.borderColor='#e05050';el.focus();
  setTimeout(()=>{el.style.borderColor=''},1200);
}

function deletePerson(id){
  people=people.filter(p=>p.id!==id);
  renderPeople();updateCalcBtn();
  document.getElementById('resultsSection').style.display='none';
}

function startEdit(id){
  const p=people.find(x=>x.id===id);if(!p)return;
  const el=document.getElementById('item_'+id);
  el.classList.add('editing');
  el.innerHTML=`<div class="edit-grid">
    <input class="input-field" id="eName_${id}" type="text" value="${esc(p.name)}" maxlength="60">
    <input class="input-field" id="eCourses_${id}" type="number" min="0" step="1" value="${p.courses}">
    <input class="input-field" id="eInvoices_${id}" type="number" min="0" step="1" value="${p.invoices}">
    <button class="btn-add" onclick="saveEdit(${id})">✓</button>
  </div>
  <button class="btn-reset" style="margin-top:6px" onclick="renderPeople()">Anuluj</button>`;
  document.getElementById('eName_'+id).focus();
}

function saveEdit(id){
  const name=document.getElementById('eName_'+id).value.trim();
  const courses=parseInt(document.getElementById('eCourses_'+id).value)||0;
  const invoices=parseInt(document.getElementById('eInvoices_'+id).value)||0;
  if(!name)return;
  const p=people.find(x=>x.id===id);
  if(p){p.name=name;p.courses=courses;p.invoices=invoices;}
  renderPeople();
  document.getElementById('resultsSection').style.display='none';
}

function renderPeople(){
  const list=document.getElementById('peopleList');
  if(!people.length){list.innerHTML='<div class="empty-hint">Brak uczestników — dodaj pierwszą osobę powyżej.</div>';return;}
  list.innerHTML=people.map(p=>`
    <div class="person-item" id="item_${p.id}">
      <div class="person-info">
        <div class="person-name">${esc(p.name)}</div>
        <div class="person-meta">🏫 ${p.courses} kursów &nbsp;·&nbsp; 🧾 ${p.invoices} faktur</div>
      </div>
      <div class="person-actions">
        <button class="btn-icon" onclick="startEdit(${p.id})">✏️</button>
        <button class="btn-icon del" onclick="deletePerson(${p.id})">🗑️</button>
      </div>
    </div>`).join('');
}

function updateCalcBtn(){
  document.getElementById('calcBtn').disabled=people.length===0;
}

function calculate(){
  if(!people.length)return;
  const poolC=parseFloat(document.getElementById('poolCourses').value)||0;
  const poolI=parseFloat(document.getElementById('poolInvoices').value)||0;

  const top3c=[...people].sort((a,b)=>b.courses-a.courses).slice(0,3).filter(p=>p.courses>0);
  const top3i=[...people].sort((a,b)=>b.invoices-a.invoices).slice(0,3).filter(p=>p.invoices>0);

  const sumC=top3c.reduce((s,p)=>s+p.courses,0);
  const sumI=top3i.reduce((s,p)=>s+p.invoices,0);
  const perC=sumC>0?poolC/sumC:0;
  const perI=sumI>0?poolI/sumI:0;

  document.getElementById('resCourses').innerHTML=top3c.map((p,i)=>entry(i,p.name,p.courses,'kursów',Math.round(perC*p.courses))).join('');
  document.getElementById('resInvoices').innerHTML=top3i.map((p,i)=>entry(i,p.name,p.invoices,'faktur',Math.round(perI*p.invoices))).join('');
  document.getElementById('totalCourses').textContent='$'+fmt(poolC);
  document.getElementById('totalInvoices').textContent='$'+fmt(poolI);

  // Combined
  const bonuses={};
  top3c.forEach(p=>{if(!bonuses[p.id])bonuses[p.id]={name:p.name,fromC:0,fromI:0};bonuses[p.id].fromC+=Math.round(perC*p.courses);});
  top3i.forEach(p=>{if(!bonuses[p.id])bonuses[p.id]={name:p.name,fromC:0,fromI:0};bonuses[p.id].fromI+=Math.round(perI*p.invoices);});
  const sorted=Object.values(bonuses).sort((a,b)=>(b.fromC+b.fromI)-(a.fromC+a.fromI));

  document.getElementById('summaryRows').innerHTML=sorted.map(b=>{
    const total=b.fromC+b.fromI;
    let tags='';
    if(b.fromC>0)tags+=`<span class="sr-tag c">Kursy: $${fmt(b.fromC)}</span>`;
    if(b.fromI>0)tags+=`<span class="sr-tag i">Faktury: $${fmt(b.fromI)}</span>`;
    return `<div class="summary-row"><span class="sr-name">${esc(b.name)}</span><div class="sr-right">${tags}<span class="sr-total">$${fmt(total)}</span></div></div>`;
  }).join('');

  document.getElementById('resultsSection').style.display='block';
  setTimeout(()=>document.getElementById('resultsSection').scrollIntoView({behavior:'smooth',block:'start'}),50);
}

function entry(i,name,count,unit,amount){
  return `<div class="result-entry" style="animation-delay:${i*.07}s">
    <span class="re-rank">${EM[i]||((i+1)+'.')}</span>
    <div class="re-info"><div class="re-name">${esc(name)}</div><div class="re-detail">${count} ${unit}</div></div>
    <span class="re-amount">$${fmt(amount)}</span>
  </div>`;
}

function resetAll(){
  if(people.length>0&&!confirm('Wyczyścić wszystkich uczestników?'))return;
  people=[];
  document.getElementById('poolCourses').value='120000';
  document.getElementById('poolInvoices').value='120000';
  ['newName','newCourses','newInvoices'].forEach(id=>document.getElementById(id).value='');
  renderPeople();updateCalcBtn();
  document.getElementById('resultsSection').style.display='none';
}

function toggleTheme(){
  dark=!dark;document.body.classList.toggle('dark',dark);
  document.getElementById('themeBtn').textContent=dark?'☀️ Jasny':'🌙 Ciemny';
}

function fmt(n){return Math.round(n).toLocaleString('pl-PL')}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&['newName','newCourses','newInvoices'].includes(document.activeElement?.id))addPerson();
});
</script>
</body>
</html>
